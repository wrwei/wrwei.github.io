site_name: Ran Wei (Will)
site_url: https://wrwei.github.io/
site_author: Ran Wei
site_description: >-
  Associate Professor of Computer Science at Lancaster University.
  Research in Model Based Systems Engineering, Safety Critical Systems,
  and Digital Twins.

theme:
  name: material
  custom_dir: overrides
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to cream mode
    - scheme: cream
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/coffee
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.top
    - navigation.footer
    - navigation.expand
    - search.highlight
    - search.suggest
    - content.tooltips

plugins:
  - search
  - blog:
      blog_dir: blog
      post_date_format: d MMMM yyyy
      post_url_format: "{date}/{slug}"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/wrwei
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/rwei/
      name: LinkedIn
    - icon: fontawesome/solid/envelope
      link: mailto:r.wei5@lancaster.ac.uk
      name: Email
    - icon: fontawesome/solid/graduation-cap
      link: https://scholar.google.com/citations?user=HY8KkDAAAAAJ&hl=en
      name: Google Scholar

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

nav:
  - Home: index.md
  - Publications: publications.md
  - Research Group: group.md
  - Tutorials:
    - tutorials/index.md
    - Object Oriented Design: tutorials/ood/index.md
  # - Blog: blog/index.md
  - More:
    - Mentors: mentors.md
    - Friends & Collaborators: friends.md
    - Guestbook: guestbook.md

markdown_extensions:
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
